<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Meat Pro Dubai</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #C62828; --green: #25D366; --dark: #1a1a1a; }
        body { background: #f4f4f4; font-family: 'Noto Sans', sans-serif; margin: 0; padding: 20px; }
        
        .checkout-layout {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .checkout-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 { font-family: 'Roboto'; font-size: 1.8rem; margin-top: 0; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; color: #555; }
        input, textarea, select { 
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; 
            box-sizing: border-box; font-size: 1rem; transition: border 0.3s;
        }

        /* Toggle Button Styling */
        .toggle-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
        }

        .toggle-btn.active {
            border-color: var(--red);
            background: #fff5f5;
            color: var(--red);
        }

        /* Error Message Styling */
        #error-box {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid var(--red);
            font-weight: 700;
        }

        /* Button Styling */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        .btn-place {
            width: 100%; background: var(--red); color: white; border: none; padding: 20px; 
            border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; 
            transition: 0.3s;
        }

        .btn-whatsapp {
            width: 100%; background: var(--green); color: white; border: none; padding: 20px; 
            border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; 
            text-decoration: none; display: flex; align-items: center; justify-content: center;
        }

        .btn-place:disabled { background: #ccc; cursor: not-allowed; }

        /* Summary Sidebar */
        .summary-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            height: fit-content;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .total-row { border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: space-between; }

        @media (max-width: 850px) {
            .checkout-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="checkout-layout">
        <div class="checkout-card">
            <h2>Checkout Details</h2>
            
            <div id="error-box"></div>

            <label>Order Method</label>
            <div class="toggle-container">
                <div class="toggle-btn active" id="btn-delivery" onclick="setMethod('Delivery')">🚚 Delivery</div>
                <div class="toggle-btn" id="btn-collect" onclick="setMethod('Click and Collect')">🏪 Store Pickup</div>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="cust-phone" placeholder="058 938 8096">
            </div>

            <div class="input-group" id="address-section">
                <label>Dubai Delivery Address</label>
                <textarea id="cust-address" rows="2" placeholder="Building, Villa, Area in Dubai"></textarea>
            </div>

            <div class="input-group">
                <label>Order Instructions (Optional)</label>
                <textarea id="order-instructions" rows="2" placeholder="Example: Well done, cut in pieces, etc."></textarea>
            </div>

            <div class="input-group" id="payment-section">
                <label>Payment Method</label>
                <select id="payment-mode">
                    <option value="Cash on Delivery">💵 Cash on Delivery</option>
                    <option value="Card on Delivery">💳 Card on Delivery</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn-place" id="place-order-btn" onclick="submitOrder('direct')">Order Now</button>
                <button class="btn-whatsapp" onclick="submitOrder('whatsapp')">Order Via WhatsApp</button>
            </div>
        </div>

        <div class="summary-card">
            <h3 style="margin-top:0;">Summary</h3>
            <div id="summary-items"></div>
            <div class="total-row">
                <span>Total</span>
                <span id="summary-total">AED 0.00</span>
            </div>
        </div>
    </div>

    <script>
        const SHOP_URL = "https://w3bhookecho42x9.dpdns.org";
        let currentMethod = "Delivery";

        function setMethod(m) {
            currentMethod = m;
            document.getElementById('btn-delivery').classList.toggle('active', m === 'Delivery');
            document.getElementById('btn-collect').classList.toggle('active', m === 'Click and Collect');
            
            // HIDE payment and address for Store Pickup
            document.getElementById('address-section').style.display = (m === 'Delivery') ? 'block' : 'none';
            document.getElementById('payment-section').style.display = (m === 'Delivery') ? 'block' : 'none';
        }

        async function submitOrder(flow) {
            const btn = document.getElementById('place-order-btn');
            const errorBox = document.getElementById('error-box');
            
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = (currentMethod === 'Delivery') ? document.getElementById('cust-address').value : "Store Pickup - Al Jaddaf";
            const instructions = document.getElementById('order-instructions').value;
            const payment = (currentMethod === 'Delivery') ? document.getElementById('payment-mode').value : "Pay at Store";
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');

            if(!name || !phone || (currentMethod === 'Delivery' && !address)) {
                showError("Please complete all required fields.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Checking Address...";
            errorBox.style.display = 'none';

            // Fixed Data Payload for Server and Kitchen
            const orderData = {
                id: Date.now(),
                customer: name,
                phone: phone,
                address: address,
                instructions: instructions || "None",
                payment: payment,
                method: currentMethod,
                items: cart.map(i => ({
                    name: i.name,
                    qty: i.quantity || 1,
                    price: i.price,
                    subtotal: (i.price * (i.quantity || 1)).toFixed(2)
                })),
                total: document.getElementById('summary-total').innerText
            };

            try {
                const response = await fetch(SHOP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (response.status === 403) {
                    showError(`❌ BLOCK: ${result.message}`);
                    btn.disabled = false;
                    btn.innerText = "Order Now";
                } else if (response.ok) {
                    localStorage.setItem('lastMeatOrderInfo', JSON.stringify({id: orderData.id, method: currentMethod}));
                    
                    if (flow === 'whatsapp') {
                        let itemStr = cart.map(i => `- ${i.name} (x${i.quantity || 1}): AED ${(i.price * (i.quantity || 1)).toFixed(2)}`).join('%0A');
                        const waMsg = `*New Order: ${orderData.id}*%0A%0A*Name:* ${name}%0A*Method:* ${currentMethod}%0A*Address:* ${address}%0A*Note:* ${instructions || 'None'}%0A%0A*Items:*%0A${itemStr}%0A%0A*Total: ${orderData.total}*`;
                        window.location.href = `https://wa.me/971589388096?text=${waMsg}`;
                    } else {
                        window.location.href = "success.html";
                    }
                    localStorage.removeItem('cart');
                }
            } catch (err) {
                showError("Server offline. Please use the WhatsApp button instead.");
                btn.disabled = false;
                btn.innerText = "Order Now";
            }
        }

        function showError(msg) {
            const eb = document.getElementById('error-box');
            eb.innerText = msg;
            eb.style.display = 'block';
        }

        // Initialize Summary Panel
        (function() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let total = 0;
            const container = document.getElementById('summary-items');
            
            container.innerHTML = cart.map(i => {
                const price = parseFloat(i.price || 0);
                const qty = parseInt(i.quantity || 1);
                total += (price * qty);
                return `<div class="summary-item">
                            <span><strong>${qty}x</strong> ${i.name}</span>
                            <span>AED ${(price * qty).toFixed(2)}</span>
                        </div>`;
            }).join('');
            
            document.getElementById('summary-total').innerText = `AED ${total.toFixed(2)}`;
        })();
    </script>
</body>
</html>
