<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Meat Pro Dubai</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #C62828; --dark: #1a1a1a; }
        body { background: #f4f4f4; font-family: 'Noto Sans', sans-serif; margin: 0; padding: 20px; }
        
        .checkout-layout {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .checkout-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 { font-family: 'Roboto'; font-size: 1.8rem; margin-top: 0; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; color: #555; }
        input, textarea, select { 
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; 
            box-sizing: border-box; font-size: 1rem; transition: border 0.3s;
        }

        .toggle-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
        }

        .toggle-btn.active {
            border-color: var(--red);
            background: #fff5f5;
            color: var(--red);
        }

        #error-box {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid var(--red);
            font-weight: 700;
        }

        .summary-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            height: fit-content;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .total-row { border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: space-between; }

        .btn-place {
            width: 100%; background: var(--red); color: white; border: none; padding: 20px; 
            border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; 
            margin-top: 20px; transition: 0.3s;
        }
        .btn-place:disabled { background: #ccc; cursor: not-allowed; }

        @media (max-width: 850px) { .checkout-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="checkout-layout">
        <div class="checkout-card">
            <h2>Checkout Details</h2>
            
            <div id="error-box"></div>

            <label>Order Method</label>
            <div class="toggle-container">
                <div class="toggle-btn active" id="btn-delivery" onclick="setMethod('Delivery')">🚚 Delivery</div>
                <div class="toggle-btn" id="btn-collect" onclick="setMethod('Click and Collect')">🏪 Store Pickup</div>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="cust-phone" placeholder="058 938 8096">
            </div>

            <div class="input-group" id="address-section">
                <label>Dubai Delivery Address</label>
                <textarea id="cust-address" rows="3" placeholder="Building, Villa, Area in Dubai"></textarea>
            </div>

            <div class="input-group">
                <label>Payment Method</label>
                <select id="payment-mode">
                    <option value="Cash on Delivery">💵 Cash on Delivery / Collection</option>
                    <option value="Card on Delivery">💳 Card on Delivery / Collection</option>
                </select>
            </div>

            <button class="btn-place" id="place-order-btn" onclick="submitOrder()">PLACE ORDER VIA WHATSAPP SYNC</button>
        </div>

        <div class="summary-card">
            <h3 style="margin-top:0;">Summary</h3>
            <div id="summary-items"></div>
            <div class="total-row">
                <span>Total</span>
                <span id="summary-total">AED 0.00</span>
            </div>
        </div>
    </div>

    <script>
        const SHOP_URL = "https://w3bhookecho42x9.dpdns.org";
        let currentMethod = "Delivery";

        function setMethod(m) {
            currentMethod = m;
            document.getElementById('btn-delivery').classList.toggle('active', m === 'Delivery');
            document.getElementById('btn-collect').classList.toggle('active', m === 'Click and Collect');
            document.getElementById('address-section').style.display = (m === 'Delivery') ? 'block' : 'none';
        }

        async function submitOrder() {
            const btn = document.getElementById('place-order-btn');
            const errorBox = document.getElementById('error-box');
            
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = (currentMethod === 'Delivery') ? document.getElementById('cust-address').value : "Store Pickup - Al Jaddaf";
            const payment = document.getElementById('payment-mode').value;

            if(!name || !phone || (currentMethod === 'Delivery' && !address)) {
                showError("Please complete all required fields.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "VALIDATING ADDRESS...";
            errorBox.style.display = 'none';

            const orderData = {
                id: Date.now(),
                customer: name,
                phone: phone,
                address: address,
                payment: payment,
                method: currentMethod,
                items: JSON.parse(localStorage.getItem('cart') || '[]'),
                total: document.getElementById('summary-total').innerText
            };

            try {
                const response = await fetch(SHOP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (response.status === 403) {
                    showError(`❌ AI BLOCK: ${result.message}`);
                    btn.disabled = false;
                    btn.innerText = "PLACE ORDER VIA WHATSAPP SYNC";
                } else if (response.ok) {
                    // Save for success page
                    localStorage.setItem('lastMeatOrderInfo', JSON.stringify({id: orderData.id, method: currentMethod}));
                    
                    // --- WHATSAPP REDIRECT ---
                    const waMsg = `*New Order: ${orderData.id}*%0A*Customer:* ${name}%0A*Method:* ${currentMethod}%0A*Payment:* ${payment}%0A*Address:* ${address}%0A*Total:* ${orderData.total}`;
                    window.location.href = `https://wa.me/971589388096?text=${waMsg}`;
                    
                    // Note: Success.html should be handled after WA or as a separate flow. 
                    // To ensure the kitchen gets it, the fetch above already happened.
                }
            } catch (err) {
                showError("Shop server offline. Please contact us directly.");
                btn.disabled = false;
                btn.innerText = "PLACE ORDER VIA WHATSAPP SYNC";
            }
        }

        function showError(msg) {
            const eb = document.getElementById('error-box');
            eb.innerText = msg;
            eb.style.display = 'block';
        }

        // Initialize Summary
        (function() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let total = 0;
            document.getElementById('summary-items').innerHTML = cart.map(i => {
                total += (i.price * (i.quantity || 1));
                return `<div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:5px;">
                            <span>${i.name} x${i.quantity || 1}</span>
                            <span>AED ${(i.price * (i.quantity || 1)).toFixed(2)}</span>
                        </div>`;
            }).join('');
            document.getElementById('summary-total').innerText = `AED ${total.toFixed(2)}`;
        })();
    </script>
</body>
</html>
