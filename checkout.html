<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Meat Pro Dubai</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { --red: #C62828; --green: #25D366; --dark: #1a1a1a; }
        body { background: #f4f4f4; font-family: 'Noto Sans', sans-serif; margin: 0; padding: 20px; }
        
        /* Layout */
        .checkout-layout { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .checkout-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        
        /* Back Button */
        .back-link { text-decoration: none; color: #888; font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; display: inline-block; transition: 0.3s; }
        .back-link:hover { color: var(--red); }

        /* Form Elements */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; color: #555; }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; transition: 0.2s; }
        input:focus { border-color: var(--red); outline: none; background: #fffcfc; }
        
        /* Method Toggles */
        .toggle-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .toggle-btn { padding: 12px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; text-align: center; transition: 0.3s; }
        .toggle-btn.active { border-color: var(--red); background: #fff5f5; color: var(--red); }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn-place { width: 100%; background: var(--red); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-place:hover { background: #a31f1f; }
        .btn-whatsapp { width: 100%; background: var(--green); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: 0.3s; }
        .btn-whatsapp:hover { background: #1ebe57; }
        .btn-place:disabled { background: #ccc; cursor: not-allowed; }
        
        #error-box { display: none; background: #ffebee; color: #c62828; padding: 15px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid var(--red); font-weight: 700; }
        
        /* Summary Sidebar */
        .summary-card { background: white; padding: 25px; border-radius: 20px; height: fit-content; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: sticky; top: 20px; }
        .summary-item { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 10px; color: #666; }
        .total-row { border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: space-between; color: var(--dark); }
        
        @media (max-width: 850px) { 
            .checkout-layout { grid-template-columns: 1fr; }
            .summary-card { position: static; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="checkout-layout">
        <div class="checkout-card">
            <h2>Checkout Details</h2>
            <div id="error-box"></div>

            <label>Order Method</label>
            <div class="toggle-container">
                <div class="toggle-btn active" id="btn-delivery" onclick="setMethod('Delivery')">🚚 Delivery</div>
                <div class="toggle-btn" id="btn-collect" onclick="setMethod('Click and Collect')">🏪 Store Pickup</div>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="cust-phone" placeholder="058 938 8096">
            </div>

            <div class="input-group" id="address-section">
                <label>Dubai Delivery Address</label>
                <textarea id="cust-address" rows="2" placeholder="Building, Villa, Area in Dubai"></textarea>
            </div>

            <div class="input-group">
                <label>Order Instructions (Optional)</label>
                <textarea id="order-instructions" rows="2" placeholder="Example: Cut the meat in small pieces, well done, etc."></textarea>
            </div>

            <div class="input-group" id="payment-section">
                <label>Payment Method</label>
                <select id="payment-mode">
                    <option value="Cash on Delivery">💵 Cash on Delivery</option>
                    <option value="Card on Delivery">💳 Card on Delivery</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn-place" id="place-order-btn" onclick="submitOrder('direct')">SEND ORDER TO KITCHEN</button>
                <button class="btn-whatsapp" onclick="submitOrder('whatsapp')">ORDER VIA WHATSAPP SYNC</button>
            </div>
        </div>

        <div class="summary-card">
            <h3 style="margin-top:0;">Summary</h3>
            <div id="summary-items"></div>
            <div class="total-row">
                <span>Total</span>
                <span id="summary-total">AED 0.00</span>
            </div>
        </div>
    </div>

    <script>
    // Pointing to your PUBLIC DPDNS URL so GitHub can actually find your PC
    const SHOP_URL = "https://w3bhookecho42x9.dpdns.org"; 
    let currentMethod = "Delivery";

    function setMethod(m) {
        currentMethod = m;
        document.getElementById('btn-delivery').classList.toggle('active', m === 'Delivery');
        document.getElementById('btn-collect').classList.toggle('active', m === 'Click and Collect');
        document.getElementById('address-section').style.display = (m === 'Delivery') ? 'block' : 'none';
        document.getElementById('payment-section').style.display = (m === 'Delivery') ? 'block' : 'none';
    }

    function renderSummary() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('summary-items');
        const totalDisplay = document.getElementById('summary-total');
        
        if (cart.length === 0) {
            container.innerHTML = "<p style='color:#888;'>Your cart is empty.</p>";
            return;
        }

        let total = 0;
        container.innerHTML = cart.map(item => {
            const sub = item.price * item.quantity;
            total += sub;
            return `<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.9rem;">
                        <span>${item.quantity}x ${item.name}</span>
                        <span>AED ${sub.toFixed(2)}</span>
                    </div>`;
        }).join('');
        totalDisplay.innerText = `AED ${total.toFixed(2)}`;
    }

    async function submitOrder(flow) {
        const btn = document.getElementById('place-order-btn');
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const address = (currentMethod === 'Delivery') ? document.getElementById('cust-address').value : "Store Pickup";
        const total = document.getElementById('summary-total').innerText;

        if(!name || !phone || (currentMethod === 'Delivery' && !address)) {
            alert("Please fill in all required fields.");
            return;
        }

        const orderID = Date.now().toString().slice(-6);
        let itemStr = cart.map(i => `- ${i.name} (x${i.quantity})`).join('\n');
        
        if (flow === 'whatsapp') {
            const waMsg = encodeURIComponent(`*New Meat Pro Order #${orderID}*\n\n*Customer:* ${name}\n*Phone:* ${phone}\n*Method:* ${currentMethod}\n*Address:* ${address}\n\n*Items:*\n${itemStr}\n\n*Total:* ${total}`);
            window.location.href = `https://wa.me/971589388096?text=${waMsg}`;
            localStorage.removeItem('cart');
            return;
        }

        btn.disabled = true;
        btn.innerText = "SENDING...";

        try {
            const response = await fetch(SHOP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: orderID,
                    customer: name,
                    phone: phone,
                    address: address,
                    items: cart,
                    total: total,
                    method: currentMethod
                })
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.removeItem('cart');
                // Redirect to success.html with the ID
                window.location.href = `success.html?id=${orderID}`;
            } else {
                alert(result.message || "Order rejected.");
                btn.disabled = false;
                btn.innerText = "SEND ORDER TO KITCHEN";
            }
        } catch (err) {
            console.error(err);
            alert("Connection Error. Please use WHATSAPP button.");
            btn.disabled = false;
            btn.innerText = "SEND ORDER TO KITCHEN";
        }
    }

    // Auto-fill from account data
    document.addEventListener('DOMContentLoaded', async () => {
        renderSummary(); // Your existing function
    
        // Check if we have a cached profile in the browser
        const savedProfile = localStorage.getItem('userProfile');
        if (savedProfile) {
            const profile = JSON.parse(savedProfile);
            if (document.getElementById('cust-name')) document.getElementById('cust-name').value = profile.name || "";
            if (document.getElementById('cust-phone')) document.getElementById('cust-phone').value = profile.phone || "";
            if (document.getElementById('cust-address')) document.getElementById('cust-address').value = profile.address || "";
        }
    });

    document.addEventListener('DOMContentLoaded', renderSummary);
</script>
</body>
</html>
