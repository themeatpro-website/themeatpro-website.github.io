<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Meat Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@300;900&display=swap" rel="stylesheet">
    <style>
        /* Extra padding specific to this page layout */
        .checkout-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px; /* Large top/bottom padding */
        }
        .checkout-card {
            background: var(--white);
            padding: 50px; /* Internal breathing room */
            border-radius: var(--rounded);
            box-shadow: var(--shadow);
        }
        .checkout-item {
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }
        .instructions-section {
            margin: 40px 0;
        }
        .order-totals {
            margin-top: 40px;
            padding: 30px;
            background: #fdfdfd;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="checkout-wrapper">
        <nav class="checkout-nav" style="margin-bottom: 40px;">
            <div class="logo-text" onclick="window.location.href='index.html'" style="cursor:pointer">
                THE MEAT <span>PRO</span>
            </div>
            <a href="index.html" class="back-link">← Back to Gallery</a>
        </nav>

        <main class="checkout-main">
            <div class="checkout-card">
                <h2 class="section-title">Final Order Summary</h2>
                
                <div id="checkout-items-list">
                    </div>

                <div class="instructions-section">
                    <label for="order-notes" style="display: block; font-weight: 700; margin-bottom: 15px;">
                        Special Instructions
                    </label>
                    <textarea id="order-notes" placeholder="Notes for the butcher..." 
                        style="width: 100%; height: 120px; padding: 20px; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; resize: none;"></textarea>
                </div>

                <div class="order-totals">
                    <div class="total-row" style="margin-bottom: 15px; color: #666;">
                        <span>Subtotal</span>
                        <span id="summary-subtotal">0.00</span>
                    </div>
                    <div class="total-row" style="margin-bottom: 20px; color: #666;">
                        <span>Delivery</span>
                        <span style="color: #2e7d32; font-weight: bold;">FREE</span>
                    </div>
                    <div class="total-row grand-total" style="border-top: 2px solid #000; pt: 20px;">
                        <span>Total Payable</span>
                        <span id="summary-total">0.00</span>
                    </div>
                </div>

                <button class="confirm-btn" onclick="processOrder()" style="margin-top: 40px; padding: 25px;">
                    Confirm & Place Order
                </button>
            </div>
        </main>
    </div>

    <script>
        function loadCheckout() {
            const cart = JSON.parse(localStorage.getItem('meatProCart')) || [];
            const listContainer = document.getElementById('checkout-items-list');
            const totalDisplay = document.getElementById('summary-total');
            const subtotalDisplay = document.getElementById('summary-subtotal');

            if (cart.length === 0) {
                listContainer.innerHTML = '<p style="text-align:center; padding: 40px;">Your cart is empty.</p>';
                return;
            }

            let total = 0;
            const logoHTML = `<img src="currency-logo.png" class="currency-icon">`;
            
            listContainer.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="checkout-item" style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <div style="width: 70px; height: 70px; background: #eee; border-radius: 10px; overflow: hidden;">
                                <img src="${item.image || ''}" style="width: 100%; height: 100%; object-fit: cover;">
                            </div>
                            <div>
                                <div style="font-weight: 700; font-size: 1.1rem;">${item.name}</div>
                                <div style="color: var(--primary-red); font-size: 0.9rem;">Quantity: ${item.quantity}</div>
                            </div>
                        </div>
                        <div style="font-weight: 700;">${logoHTML}${itemTotal.toFixed(2)}</div>
                    </div>
                `;
            }).join('');

            subtotalDisplay.innerHTML = `${logoHTML}${total.toFixed(2)}`;
            totalDisplay.innerHTML = `${logoHTML}${total.toFixed(2)}`;
        }

        function processOrder() {
            const notes = document.getElementById('order-notes').value;
            alert(`Order Placed Successfully!\nNotes: ${notes || "None"}`);
            localStorage.removeItem('meatProCart');
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', loadCheckout);
    </script>
</body>
</html>
