<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Meat Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
</head>
<body style="background:#f8f8f8;">

    <nav>
        <div onclick="window.location.href='index.html'" style="display:flex; align-items:center; cursor:pointer;">
            <img src="assets/logo.png" style="height:45px; margin-right:12px;" onerror="this.src='assets/logo.png'">
            <div class="logo-text">THE MEAT <span style="color:var(--primary-red)">PRO</span></div>
        </div>
    </nav>

    <div style="display:grid; grid-template-columns: 1fr 400px; gap:40px; padding:40px 8%; max-width:1400px; margin:0 auto;">
        <div style="background:white; padding:40px; border-radius:16px; box-shadow:var(--shadow);">
            <h2 style="font-family:'Roboto'; margin-top:0;">DELIVERY DETAILS</h2>
            
            <div style="margin-bottom:20px;">
                <label style="display:block; font-weight:700; margin-bottom:8px;">Full Name</label>
                <input type="text" id="fn" style="width:100%; padding:14px; border:1px solid #ddd; border-radius:10px;" placeholder="John Doe">
            </div>

            <div style="margin-bottom:20px;">
                <label style="display:block; font-weight:700; margin-bottom:8px;">Full Delivery Address</label>
                <input type="text" id="ad" style="width:100%; padding:14px; border:1px solid #ddd; border-radius:10px;" placeholder="Street, Villa/Apt, Area">
            </div>

            <div style="margin-bottom:30px;">
                <label style="display:block; font-weight:700; margin-bottom:8px;">Order Notes (Optional)</label>
                <textarea id="nt" style="width:100%; padding:14px; border:1px solid #ddd; border-radius:10px; height:80px; font-family:inherit;" placeholder="e.g. Cut into small pieces..."></textarea>
            </div>

            <button class="confirm-btn" onclick="done(false)" style="margin-bottom:12px;">Confirm Order</button>
            <button onclick="done(true)" style="background:#25D366; color:white; border:none; padding:18px; border-radius:12px; font-weight:700; cursor:pointer; width:100%;">Order via WhatsApp</button>
        </div>

        <div style="background:white; padding:30px; border-radius:16px; box-shadow:var(--shadow); height:fit-content;">
            <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:15px;">Summary</h3>
            <div id="check-list"></div>
            <div style="margin-top:20px; font-weight:900; font-size:1.4rem; display:flex; justify-content:space-between;">
                <span>Total</span>
                <span>AED <span id="check-total">0.00</span></span>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('meatProCart')) || [];
        const WEBHOOK_URL = 'https://w3bhookecho42x9.dpdns.org/';

        function load() {
            const list = document.getElementById('check-list');
            list.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${i.quantity} x ${i.name}</span><span>${(i.price*i.quantity).toFixed(2)}</span></div>`).join('');
            document.getElementById('check-total').innerText = cart.reduce((s,i)=>s+(i.price*i.quantity),0).toFixed(2);
        }

        async function done(wa) {
            const n = document.getElementById('fn').value;
            const a = document.getElementById('ad').value;
            const notes = document.getElementById('nt').value || "No notes";
            
            if(!n || !a) return alert("Please provide a name and address.");

            const orderData = {
                id: Date.now(),
                customer: n,
                address: a,
                notes: notes,
                items: cart,
                total: cart.reduce((s,i)=>s+(i.price*i.quantity),0).toFixed(2),
                timestamp: new Date().toISOString()
            };

            // SEND TO YOUR WEBHOOK
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
            } catch (e) {
                console.error("Webhook failed, but proceeding with order flow.");
            }

            localStorage.setItem('lastMeatOrder', JSON.stringify(cart));
            
            if(wa) {
                let txt = `*NEW ORDER*%0A*Name:* ${n}%0A*Address:* ${a}%0A*Notes:* ${notes}%0A%0A`;
                cart.forEach(i => txt += `- ${i.quantity} x ${i.name}%0A`);
                window.open(`https://wa.me/971589388096?text=${txt}`);
            }
            
            localStorage.removeItem('meatProCart');
            window.location.href = 'success.html';
        }
        load();
    </script>
</body>
</html>
