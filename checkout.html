<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Meat Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo-container" onclick="window.location.href='index.html'" style="cursor:pointer; display:flex; align-items:center;">
            <img src="assets/logo.png" style="height:45px; margin-right:12px;" onerror="this.src='assets/logo.png'">
            <div class="logo-text">THE MEAT <span>PRO</span></div>
        </div>
    </nav>

    <div class="checkout-layout" style="display:grid; grid-template-columns:1fr 400px; gap:40px; padding:40px 8%;">
        <div style="background:white; padding:40px; border-radius:16px; box-shadow:var(--shadow);">
            <h2>Delivery Details</h2>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-weight:700; margin-bottom:5px;">Full Name</label>
                <input type="text" id="name" class="confirm-btn" style="background:white; color:black; border:1px solid #ddd; text-align:left; padding:12px;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-weight:700; margin-bottom:5px;">Full Address</label>
                <input type="text" id="address" class="confirm-btn" style="background:white; color:black; border:1px solid #ddd; text-align:left; padding:12px;">
            </div>
            <button class="confirm-btn" onclick="alert('Order Recorded!')">Confirm Order</button>
            <button class="whatsapp-btn" onclick="sendWhatsApp()">Order via WhatsApp</button>
        </div>

        <div style="background:white; padding:30px; border-radius:16px; box-shadow:var(--shadow); height:fit-content;">
            <h3>Summary</h3>
            <div id="summary-list"></div>
            <div style="margin-top:20px; font-weight:900; font-size:1.4rem;">Total: AED <span id="checkout-total">0.00</span></div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('meatProCart')) || [];
        function render() {
            const list = document.getElementById('summary-list');
            list.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>${i.quantity} x ${i.name}</span>
                <span>${(i.price * i.quantity).toFixed(2)}</span>
            </div>`).join('');
            document.getElementById('checkout-total').innerText = cart.reduce((s, i) => s + (i.price * i.quantity), 0).toFixed(2);
        }
        function sendWhatsApp() {
            const name = document.getElementById('name').value;
            const addr = document.getElementById('address').value;
            if(!name || !addr) return alert("Fill details");
            let msg = `*New Order*%0A*Name:* ${name}%0A*Address:* ${addr}%0A%0A`;
            cart.forEach(i => msg += `- ${i.quantity}x ${i.name}%0A`);
            window.open(`https://wa.me/971501234567?text=${msg}`);
        }
        render();
    </script>
</body>
</html>
