<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Meat Pro Dubai</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { --red: #C62828; --green: #25D366; --dark: #1a1a1a; --gold: #FFD700; }
        body { background: #f4f4f4; font-family: 'Noto Sans', sans-serif; margin: 0; padding: 20px; }
        .checkout-layout { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .checkout-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; color: #555; }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        /* Points Section Styling */
        .points-box { 
            background: #fffdf0; 
            border: 2px dashed var(--gold); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
        }
        .points-input-wrapper { display: flex; gap: 10px; margin-top: 10px; }
        .points-input-wrapper input { flex: 1; }
        .btn-apply-points { 
            background: var(--dark); 
            color: white; 
            border: none; 
            padding: 0 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .btn-max-points {
            background: var(--gold);
            color: #5d4037;
            border: none;
            padding: 0 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.75rem;
        }

        .toggle-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .toggle-btn { padding: 12px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; text-align: center; }
        .toggle-btn.active { border-color: var(--red); background: #fff5f5; color: var(--red); }
        
        .btn-place { width: 100%; background: var(--red); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1rem; }
        .btn-whatsapp { width: 100%; background: var(--green); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 1rem; margin-top: 10px;}
        
        .summary-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: sticky; top: 20px; }
        .total-row { border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: space-between; }
        .discount-row { color: #2e7d32; display: flex; justify-content: space-between; font-size: 0.9rem; margin-top: 8px; font-weight: bold; }

        @media (max-width: 850px) { .checkout-layout { grid-template-columns: 1fr; } .summary-card { position: static; } }
    </style>
</head>
<body>

    <div class="checkout-layout">
        <div class="checkout-card">
            <h2>Checkout Details</h2>

            <div id="points-section" class="points-box" style="display: none;">
                <label style="color: #b8860b;">🌟 Loyalty Points</label>
                <p style="font-size: 0.85rem; margin: 0; color: #666;">
                    Available: <strong id="display-available-pts">0</strong> Pts 
                    (Value: AED <span id="display-pts-value">0.00</span>)
                </p>
                <div class="points-input-wrapper">
                    <input type="number" id="points-to-use" placeholder="How many points?" min="0">
                    <button class="btn-max-points" onclick="setMaxPoints()">MAX</button>
                    <button class="btn-apply-points" onclick="applyPoints()">Apply</button>
                </div>
                <div id="points-msg" style="font-size: 0.8rem; margin-top: 8px;"></div>
            </div>

            <label>Order Method</label>
            <div class="toggle-container">
                <div class="toggle-btn active" id="btn-delivery" onclick="setMethod('Delivery')">🚚 Delivery</div>
                <div class="toggle-btn" id="btn-collect" onclick="setMethod('Click and Collect')">🏪 Store Pickup</div>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="cust-phone" placeholder="058 938 8096">
            </div>

            <div class="input-group" id="address-section">
                <label>Dubai Delivery Address</label>
                <textarea id="cust-address" rows="2" placeholder="Building, Villa, Area in Dubai"></textarea>
            </div>

            <div class="input-group">
                <label>Order Instructions (Optional)</label>
                <textarea id="order-instructions" rows="2" placeholder="Example: Cut the meat in small pieces, etc."></textarea>
            </div>

            <div class="input-group" id="payment-method-wrapper">
                <label>Payment Method</label>
                <select id="payment-mode">
                    <option value="Cash on Delivery">💵 Cash on Delivery</option>
                    <option value="Card on Delivery">💳 Card on Delivery</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn-place" id="place-order-btn" onclick="submitOrder('direct')">SEND ORDER TO KITCHEN</button>
                <button class="btn-whatsapp" onclick="submitOrder('whatsapp')">ORDER VIA WHATSAPP SYNC</button>
            </div>
        </div>

        <div class="summary-card">
            <h3 style="margin-top:0;">Summary</h3>
            <div id="summary-items"></div>
            
            <div id="discount-area"></div> 
            <div class="total-row">
                <span>Total</span>
                <span id="summary-total">AED 0.00</span>
            </div>
            <p id="earn-msg" style="font-size: 0.75rem; color: #888; text-align: right; margin-top: 10px;">
                Earn <span id="pts-to-earn">0</span> points with this order
            </p>
        </div>
    </div>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0LqPa73C7OG295rY105XApK57SQ05et4",
        authDomain: "the-meat-pro.firebaseapp.com",
        projectId: "the-meat-pro",
        storageBucket: "the-meat-pro.firebasestorage.app",
        messagingSenderId: "367375252877",
        appId: "1:367375252877:web:86b86064c126ec0058b76c"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    
    const SHOP_URL = "https://themeatpro-backend.vercel.app/api/order-webhook";
    const POINT_VAL = 0.05; // 1 point = 0.05 AED
    let currentMethod = 'Delivery'; 
    let userPointsBalance = 0;
    let appliedDiscount = 0;
    let appliedPoints = 0;

    function setMethod(method) {
        currentMethod = method;
        document.getElementById('btn-delivery').classList.toggle('active', method === 'Delivery');
        document.getElementById('btn-collect').classList.toggle('active', method === 'Click and Collect');
        const addrDiv = document.getElementById('address-section');
        if(addrDiv) addrDiv.style.display = (method === 'Delivery') ? 'block' : 'none';
    }

    function renderSummary() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('summary-items');
        const totalDisplay = document.getElementById('summary-total');
        const earnDisplay = document.getElementById('pts-to-earn');
        
        if (cart.length === 0) {
            if(container) container.innerHTML = "<p style='color:#888;'>Your cart is empty.</p>";
            return;
        }

        let subtotal = 0;
        container.innerHTML = cart.map(item => {
            const sub = item.price * item.quantity;
            subtotal += sub;
            return `<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.9rem;">
                        <span>${item.quantity}x ${item.name}</span>
                        <span>AED ${sub.toFixed(2)}</span>
                    </div>`;
        }).join('');

        const finalTotal = Math.max(0, subtotal - appliedDiscount);
        if(totalDisplay) totalDisplay.innerText = `AED ${finalTotal.toFixed(2)}`;
        
        if(earnDisplay) earnDisplay.innerText = Math.floor(finalTotal);

        const discArea = document.getElementById('discount-area');
        if (appliedDiscount > 0) {
            discArea.innerHTML = `<div class="discount-row"><span>Points Discount</span><span>-AED ${appliedDiscount.toFixed(2)}</span></div>`;
        } else {
            discArea.innerHTML = '';
        }
    }

    // Safety logic for MAX button
    function setMaxPoints() {
        const subtotal = calculateCartSubtotal();
        const pointsNeededForFree = Math.ceil(subtotal / POINT_VAL);
        
        // Use all user points OR just enough to cover the order total
        const maxSpendable = Math.min(userPointsBalance, pointsNeededForFree);
        document.getElementById('points-to-use').value = maxSpendable;
        applyPoints();
    }

    function applyPoints() {
        const input = document.getElementById('points-to-use');
        const msg = document.getElementById('points-msg');
        let pts = parseInt(input.value) || 0;
        const subtotal = calculateCartSubtotal();

        // Safety Check 1: Negative
        if (pts < 0) {
            msg.style.color = 'red';
            msg.innerText = "❌ Please enter a valid number.";
            return;
        }

        // Safety Check 2: Balance check
        if (pts > userPointsBalance) {
            msg.style.color = 'red';
            msg.innerText = `❌ Not enough points. You have ${userPointsBalance}.`;
            appliedPoints = 0;
            appliedDiscount = 0;
        } else {
            // Safety Check 3: Cap at Order Total
            const potentialDiscount = pts * POINT_VAL;
            if (potentialDiscount > subtotal) {
                // If they try to use 5000 points on a 10 AED order, we only take what is needed
                pts = Math.ceil(subtotal / POINT_VAL);
                msg.style.color = 'orange';
                msg.innerText = `⚠️ Points capped to cover order total.`;
                input.value = pts;
            } else {
                msg.style.color = 'green';
                msg.innerText = `✅ Applied AED ${(pts * POINT_VAL).toFixed(2)} discount!`;
            }

            appliedPoints = pts;
            appliedDiscount = pts * POINT_VAL;
        }

        // UI Adjustments
        const paymentWrapper = document.getElementById('payment-method-wrapper');
        if (appliedDiscount >= subtotal) {
            paymentWrapper.style.display = 'none';
        } else {
            paymentWrapper.style.display = 'block';
        }

        renderSummary();
    }

    function calculateCartSubtotal() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        return cart.reduce((s, i) => s + (i.price * i.quantity), 0);
    }

    async function submitOrder(flow) {
        const btn = document.getElementById('place-order-btn');
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const address = (currentMethod === 'Delivery') ? document.getElementById('cust-address').value : "Store Pickup";
        const instructions = document.getElementById('order-instructions').value;
        let payment = document.getElementById('payment-mode').value;
        
        const subtotal = calculateCartSubtotal();
        const finalAmount = Math.max(0, subtotal - appliedDiscount);

        if (appliedDiscount >= subtotal) payment = "Points Full Payment";

        if(!name || !phone || (currentMethod === 'Delivery' && !address)) {
            alert("Please fill in all required fields.");
            return;
        }

        if (flow === 'whatsapp') {
            let itemStr = cart.map(i => `- ${i.name} (x${i.quantity})`).join('\n');
            const waMsg = encodeURIComponent(`*New Order Request*\n*Customer:* ${name}\n*Method:* ${currentMethod}\n*Points Used:* ${appliedPoints}\n*Total:* AED ${finalAmount.toFixed(2)}\n\n*Items:*\n${itemStr}`);
            window.location.href = `https://wa.me/971589388096?text=${waMsg}`;
            localStorage.removeItem('cart');
            return;
        }

        btn.disabled = true;
        btn.innerText = "SENDING TO KITCHEN...";

        try {
            const user = firebase.auth().currentUser;
            const response = await fetch(SHOP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customerName: name,
                    phone: phone,
                    address: address,
                    method: currentMethod,
                    instructions: instructions,
                    paymentMethod: payment,
                    userId: user ? user.uid : "guest",
                    subtotal: subtotal.toFixed(2),
                    discount: appliedDiscount.toFixed(2),
                    pointsUsed: appliedPoints,
                    total: finalAmount.toFixed(2),
                    cart: cart.map(i => ({ item: i.name, qty: i.quantity }))
                })
            });

            const result = await response.json();
            if (result.success) {
                localStorage.removeItem('cart');
                window.location.href = `success.html?id=${result.orderId}`;
            } else {
                throw new Error(result.error || "Server rejected order");
            }
        } catch (err) {
            alert("Connection Error. Try again or use WhatsApp.");
            btn.disabled = false;
            btn.innerText = "SEND ORDER TO KITCHEN";
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderSummary();
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                const db = firebase.firestore();
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    userPointsBalance = userDoc.data().points || 0;
                    document.getElementById('points-section').style.display = 'block';
                    document.getElementById('display-available-pts').innerText = userPointsBalance;
                    document.getElementById('display-pts-value').innerText = (userPointsBalance * POINT_VAL).toFixed(2);
                }

                const savedProfile = localStorage.getItem('userProfile');
                if (savedProfile) {
                    const profile = JSON.parse(savedProfile);
                    if (profile.name) document.getElementById('cust-name').value = profile.name;
                    if (profile.phone) document.getElementById('cust-phone').value = profile.phone;
                    if (profile.address) document.getElementById('cust-address').value = profile.address;
                }
            }
        });
    });
</script>
</body>
</html>
