<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Meat Pro Dubai</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #C62828; --green: #25D366; --dark: #1a1a1a; }
        body { background: #f4f4f4; font-family: 'Noto Sans', sans-serif; margin: 0; padding: 20px; }
        .checkout-layout { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .checkout-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; color: #555; }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        /* Method Toggles */
        .toggle-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .toggle-btn { padding: 12px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; text-align: center; }
        .toggle-btn.active { border-color: var(--red); background: #fff5f5; color: var(--red); }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn-place { width: 100%; background: var(--red); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1rem; }
        .btn-whatsapp { width: 100%; background: var(--green); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .btn-place:disabled { background: #ccc; cursor: not-allowed; }
        
        #error-box { display: none; background: #ffebee; color: #c62828; padding: 15px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid var(--red); font-weight: 700; }
        .summary-card { background: white; padding: 25px; border-radius: 20px; height: fit-content; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .total-row { border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: space-between; }
        
        @media (max-width: 850px) { .checkout-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="checkout-layout">
        <div class="checkout-card">
            <h2>Checkout Details</h2>
            <div id="error-box"></div>

            <label>Order Method</label>
            <div class="toggle-container">
                <div class="toggle-btn active" id="btn-delivery" onclick="setMethod('Delivery')">🚚 Delivery</div>
                <div class="toggle-btn" id="btn-collect" onclick="setMethod('Click and Collect')">🏪 Store Pickup</div>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="cust-phone" placeholder="058 938 8096">
            </div>

            <div class="input-group" id="address-section">
                <label>Dubai Delivery Address</label>
                <textarea id="cust-address" rows="2" placeholder="Building, Villa, Area in Dubai"></textarea>
            </div>

            <div class="input-group">
                <label>Order Instructions (Optional)</label>
                <textarea id="order-instructions" rows="2" placeholder="Example: Cut the meat in small pieces, well done, etc."></textarea>
            </div>

            <div class="input-group" id="payment-section">
                <label>Payment Method</label>
                <select id="payment-mode">
                    <option value="Cash on Delivery">💵 Cash on Delivery</option>
                    <option value="Card on Delivery">💳 Card on Delivery</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn-place" id="place-order-btn" onclick="submitOrder('direct')">SEND ORDER TO KITCHEN</button>
                <button class="btn-whatsapp" onclick="submitOrder('whatsapp')">ORDER VIA WHATSAPP SYNC</button>
            </div>
        </div>

        <div class="summary-card">
            <h3 style="margin-top:0;">Summary</h3>
            <div id="summary-items"></div>
            <div class="total-row">
                <span>Total</span>
                <span id="summary-total">AED 0.00</span>
            </div>
        </div>
    </div>

    <script>
    const SHOP_URL = "https://w3bhookecho42x9.dpdns.org";
    let currentMethod = "Delivery";

    // --- 1. SETUP UI FUNCTIONS ---
    function setMethod(m) {
        currentMethod = m;
        document.getElementById('btn-delivery').classList.toggle('active', m === 'Delivery');
        document.getElementById('btn-collect').classList.toggle('active', m === 'Click and Collect');
        document.getElementById('address-section').style.display = (m === 'Delivery') ? 'block' : 'none';
        document.getElementById('payment-section').style.display = (m === 'Delivery') ? 'block' : 'none';
    }

    function showError(msg) {
        const eb = document.getElementById('error-box');
        eb.innerText = msg;
        eb.style.display = 'block';
    }

    // --- 2. THE SUMMARY RENDERER (The fix for "nothing showing") ---
    function renderSummary() {
        // Look specifically for 'cart'
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('summary-items');
        const totalDisplay = document.getElementById('summary-total');
        
        console.log("Checkout reading cart:", cart); // Check F12 console for this!

        if (cart.length === 0) {
            container.innerHTML = "<p style='color:#888; padding:20px 0;'>Your cart is empty.</p>";
            totalDisplay.innerText = "AED 0.00";
            return;
        }

        let total = 0;
        container.innerHTML = cart.map(item => {
            const itemPrice = parseFloat(item.price || 0);
            const itemQty = parseInt(item.quantity || 1);
            const subtotal = itemPrice * itemQty;
            total += subtotal;

            return `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <span><strong>${itemQty}x</strong> ${item.name}</span>
                    <span>AED ${subtotal.toFixed(2)}</span>
                </div>
            `;
        }).join('');

        totalDisplay.innerText = `AED ${total.toFixed(2)}`;
    }

    // --- 3. SUBMIT LOGIC ---
    async function submitOrder(flow) {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        if(cart.length === 0) return showError("Your cart is empty!");

        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        
        if(!name || !phone) return showError("Please enter your name and phone.");

        const orderData = {
            id: Date.now(),
            customer: name,
            phone: phone,
            items: cart,
            total: document.getElementById('summary-total').innerText,
            method: currentMethod,
            address: currentMethod === 'Delivery' ? document.getElementById('cust-address').value : "Pickup",
            instructions: document.getElementById('order-instructions').value || "None"
        };

        try {
            const res = await fetch(SHOP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });

            if(res.ok) {
                localStorage.removeItem('cart');
                window.location.href = "success.html";
            }
        } catch(e) {
            showError("Connection failed. Try WhatsApp instead.");
        }
    }

    // --- 4. INITIALIZE ---
    document.addEventListener('DOMContentLoaded', renderSummary);
</script>
</body>
</html>
