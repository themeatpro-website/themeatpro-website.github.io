<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | The Meat Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container { max-width: 500px; margin: 40px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: #C62828; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .status-msg { margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="profile-container">
        <h2>My Profile</h2>
        <p id="user-email" style="color: #666;"></p>
        
        <div id="profile-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profile-name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="profile-phone" placeholder="+971 XX XXX XXXX">
            </div>
            <div class="form-group">
                <label>Default Delivery Address</label>
                <input type="text" id="profile-address" placeholder="Building, Street, Area, Dubai">
            </div>
            <button class="btn-save" onclick="saveProfile()">Update Profile</button>
            <p id="save-status" class="status-msg"></p>
        </div>
        
        <button onclick="logout()" style="margin-top:20px; background:none; border:none; color: #C62828; cursor:pointer;">Logout</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>

    <script>
        // Use your DPDNS URL
        const SERVER_URL = "https://w3bhookecho42x9.dpdns.org";

        const firebaseConfig = {
          apiKey: "AIzaSyC0LqPa73C7OG295rY105XApK57SQ05et4", // Get this from Firebase Console > Project Settings
          authDomain: "the-meat-pro.firebaseapp.com",
          projectId: "the-meat-pro",
          storageBucket: "the-meat-pro.appspot.com",
          messagingSenderId: "1054538254894",
          appId: "1:680467664784:web:9ef0a533bf354926f16d15" // Get this from Firebase Console > Project Settings
        };
        firebase.initializeApp(firebaseConfig);

        let currentUser = null;

        // Check Auth State
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('user-email').innerText = user.email;
                fetchProfile(user.uid);
            } else {
                window.location.href = "login.html"; // Redirect if not logged in
            }
        });

        async function fetchProfile(uid) {
            try {
                const response = await fetch(`${SERVER_URL}/api/get-profile/${uid}`);
                const data = await response.json();
                
                if (!data.error) {
                    document.getElementById('profile-name').value = data.name || "";
                    document.getElementById('profile-phone').value = data.phone || "";
                    document.getElementById('profile-address').value = data.address || "";
                    
                    // Also save to localStorage for the checkout page to use
                    localStorage.setItem('userProfile', JSON.stringify(data));
                }
            } catch (err) {
                console.error("Error fetching profile:", err);
            }
        }

        async function saveProfile() {
            const status = document.getElementById('save-status');
            const profileData = {
                uid: currentUser.uid,
                name: document.getElementById('profile-name').value,
                phone: document.getElementById('profile-phone').value,
                address: document.getElementById('profile-address').value
            };

            status.innerText = "Saving...";
            status.style.color = "blue";

            try {
                const response = await fetch(`${SERVER_URL}/api/save-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profileData)
                });

                if (response.ok) {
                    status.innerText = "Profile updated successfully!";
                    status.style.color = "green";
                    localStorage.setItem('userProfile', JSON.stringify(profileData));
                }
            } catch (err) {
                status.innerText = "Failed to connect to server.";
                status.style.color = "red";
            }
        }

        function logout() {
            firebase.auth().signOut();
        }
    </script>
</body>
</html>
