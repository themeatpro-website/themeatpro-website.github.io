<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | The Meat Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Noto Sans', sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 1000px; margin: 40px auto; display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        
        .profile-card, .orders-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        
        .back-link { text-decoration: none; color: #888; font-size: 0.85rem; font-weight: bold; display: block; margin-bottom: 20px; transition: 0.3s; }
        .back-link:hover { color: #C62828; }
        
        h2 { color: #C62828; font-weight: 900; margin-bottom: 25px; margin-top: 0; font-size: 1.4rem; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; background: #fafafa; font-size: 0.9rem; }
        
        .btn-save { background: #C62828; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { background: #a31f1f; }
        
        /* Order History Items */
        .order-item { 
            border: 1px solid #eee; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .order-item:hover { border-color: #C62828; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .order-id { font-weight: bold; color: #333; font-family: 'Roboto', sans-serif; }
        .order-date { color: #999; font-size: 0.85rem; }
        .order-total { color: #C62828; font-weight: 900; font-size: 1.1rem; }
        .order-status { font-size: 0.7rem; background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; font-weight: bold; }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <a href="index.html" class="back-link">← Back to Shop</a>
            <h2>Account Details</h2>
            <div class="form-group">
                <label>Login Email</label>
                <input type="text" id="user-email" disabled>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profile-name" placeholder="Name">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="profile-phone" placeholder="05X XXX XXXX">
            </div>
            <div class="form-group">
                <label>Default Address</label>
                <input type="text" id="profile-address" placeholder="Building, Street, Area">
            </div>
            <button id="save-btn" class="btn-save">Save Changes</button>
            <p id="save-status" style="font-size: 0.8rem; margin-top: 10px; text-align: center; font-weight: bold;"></p>
            
            <button id="logout-btn" style="background:none; border:none; color:#bbb; width:100%; margin-top:30px; cursor:pointer; font-size:0.8rem; text-decoration: underline;">Logout from Store</button>
        </div>

        <div class="orders-card">
            <h2>Order History</h2>
            <div id="orders-list">
                <p style="color:#bbb; font-size:0.9rem; text-align: center; padding-top: 20px;">Fetching your orders...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = {
                apiKey: "AIzaSyC0LqPa73C7OG295rY105XApK57SQ05et4", 
                authDomain: "the-meat-pro.firebaseapp.com",
                projectId: "the-meat-pro",
                storageBucket: "the-meat-pro.appspot.com",
                messagingSenderId: "1054538254894",
                appId: "1:680467664784:web:9ef0a533bf354926f16d15" 
            };
            
            if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
            const db = firebase.firestore();
            const SERVER_URL = "https://themeatpro-backend.vercel.app";

            firebase.auth().onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('user-email').value = user.email;
                    fetchProfile(user.uid);
                    fetchOrders(user.uid);
                } else {
                    window.location.href = "login.html";
                }
            });

            async function fetchProfile(uid) {
                try {
                    const response = await fetch(`${SERVER_URL}/api/get-profile/${uid}`);
                    const data = await response.json();
                    if (!data.error) {
                        document.getElementById('profile-name').value = data.name || "";
                        document.getElementById('profile-phone').value = data.phone || "";
                        document.getElementById('profile-address').value = data.address || "";
                    }
                } catch (err) { console.error("Profile load failed"); }
            }

            async function fetchOrders(uid) {
                const ordersList = document.getElementById('orders-list');
                try {
                    // This queries the 'orders' collection for the current user
                    const snapshot = await db.collection("orders")
                        .where("userId", "==", uid)
                        .orderBy("orderDate", "desc")
                        .get();

                    if (snapshot.empty) {
                        ordersList.innerHTML = `
                            <div style="text-align:center; padding: 40px; color:#bbb;">
                                <div style="font-size: 3rem; margin-bottom:10px;">📦</div>
                                <p>You haven't placed any orders yet.</p>
                            </div>`;
                        return;
                    }

                    ordersList.innerHTML = snapshot.docs.map(doc => {
                        const order = doc.data();
                        const date = new Date(order.orderDate).toLocaleDateString('en-AE', { 
                            year: 'numeric', month: 'long', day: 'numeric' 
                        });
                        return `
                            <div class="order-item">
                                <div class="order-header">
                                    <span class="order-id">#${order.orderNumber}</span>
                                    <span class="order-date">${date}</span>
                                </div>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span style="font-size:0.85rem; color:#666;">
                                        ${order.items.map(i => i.name).join(', ')}
                                    </span>
                                    <span class="order-total">AED ${order.total.toFixed(2)}</span>
                                </div>
                                <div style="margin-top:12px;">
                                    <span class="order-status">${order.status || 'Processing'}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                } catch (err) {
                    console.error("Orders load failed:", err);
                    ordersList.innerHTML = `<p style="color:red; text-align:center;">Could not load order history.</p>`;
                }
            }

            document.getElementById('save-btn').onclick = async () => {
                const user = firebase.auth().currentUser;
                const status = document.getElementById('save-status');
                const profileData = {
                    uid: user.uid,
                    name: document.getElementById('profile-name').value,
                    phone: document.getElementById('profile-phone').value,
                    address: document.getElementById('profile-address').value
                };
            
                status.innerText = "Saving...";
                try {
                    const res = await fetch(`${SERVER_URL}/api/save-profile`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(profileData)
                    });
                    if (res.ok) {
                        status.innerText = "✅ Updated!";
                        status.style.color = "green";
                        // Cache locally for checkout auto-fill
                        localStorage.setItem('userProfile', JSON.stringify(profileData));
                    }
                } catch (e) {
                    status.innerText = "❌ Error.";
                }
            };
            
            document.getElementById('logout-btn').onclick = () => {
                firebase.auth().signOut().then(() => {
                    localStorage.removeItem('userProfile');
                    window.location.href = "index.html";
                });
            };
        });
    </script>
</body>
</html>
