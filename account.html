<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | The Meat Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Noto Sans', sans-serif; background: #f4f4f4; padding: 20px; }
        .profile-container { max-width: 500px; margin: 40px auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .back-link { position: absolute; top: 15px; left: 20px; text-decoration: none; color: #888; font-size: 0.85rem; font-weight: bold; transition: 0.3s; }
        .back-link:hover { color: #C62828; }
        h2 { color: #C62828; font-weight: 900; margin-bottom: 5px; margin-top: 10px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-save { background: #C62828; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        .status-msg { margin-top: 15px; font-size: 0.9rem; font-weight: bold; min-height: 1.2em; }
        .logout-link { margin-top: 30px; display: block; color: #888; text-decoration: none; font-size: 0.9rem; cursor: pointer; background: none; border: none; width: 100%; }
        .logout-link:hover { color: #C62828; }
    </style>
</head>
<body>

    <div class="profile-container">
        <a href="index.html" class="back-link">← Back to Shop</a>

        <h2>My Profile</h2>
        <p id="user-email" style="color: #666; margin-bottom: 30px; font-size: 0.9rem;"></p>
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="profile-name" placeholder="Loading name...">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="profile-phone" placeholder="+971 XX XXX XXXX">
        </div>
        <div class="form-group">
            <label>Default Delivery Address</label>
            <input type="text" id="profile-address" placeholder="Building, Street, Area, Dubai">
        </div>
        
        <button id="save-btn" class="btn-save">Update Profile</button>
        <p id="save-status" class="status-msg"></p>
        
        <button id="logout-btn" class="logout-link">Logout from Account</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = {
                apiKey: "AIzaSyC0LqPa73C7OG295rY105XApK57SQ05et4", 
                authDomain: "the-meat-pro.firebaseapp.com",
                projectId: "the-meat-pro",
                storageBucket: "the-meat-pro.appspot.com",
                messagingSenderId: "1054538254894",
                appId: "1:680467664784:web:9ef0a533bf354926f16d15" 
            };
            
            if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
            
            const SERVER_URL = "https://w3bhookecho42x9.dpdns.org";
            let currentUser = null;

            const nameInput = document.getElementById('profile-name');
            const phoneInput = document.getElementById('profile-phone');
            const addrInput = document.getElementById('profile-address');
            const statusMsg = document.getElementById('save-status');
            const saveBtn = document.getElementById('save-btn');
            const logoutBtn = document.getElementById('logout-btn');

            firebase.auth().onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    document.getElementById('user-email').innerText = user.email;
                    fetchProfile(user.uid);
                } else {
                    window.location.href = "login.html";
                }
            });

            async function fetchProfile(uid) {
                try {
                    const response = await fetch(`${SERVER_URL}/api/get-profile/${uid}`);
                    const data = await response.json();
                    if (!data.error) {
                        nameInput.value = data.name || "";
                        phoneInput.value = data.phone || "";
                        addrInput.value = data.address || "";
                        nameInput.placeholder = "Enter your name";
                        localStorage.setItem('userProfile', JSON.stringify(data));
                    }
                } catch (err) { console.error("Error fetching profile:", err); }
            }

            saveBtn.addEventListener('click', async () => {
                if (!currentUser) return;
                const profileData = {
                    uid: currentUser.uid,
                    name: nameInput.value,
                    phone: phoneInput.value,
                    address: addrInput.value
                };
                statusMsg.innerText = "Saving to secure server...";
                statusMsg.style.color = "#ef6c00";
                try {
                    const response = await fetch(`${SERVER_URL}/api/save-profile`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(profileData)
                    });
                    if (response.ok) {
                        statusMsg.innerText = "✅ Profile updated successfully!";
                        statusMsg.style.color = "#2e7d32";
                        localStorage.setItem('userProfile', JSON.stringify(profileData));
                    }
                } catch (err) {
                    statusMsg.innerText = "❌ Connection failed.";
                    statusMsg.style.color = "#C62828";
                }
            });

            logoutBtn.addEventListener('click', () => {
                firebase.auth().signOut().then(() => {
                    localStorage.removeItem('userProfile');
                    window.location.href = "index.html";
                });
            });
        });
    </script>
</body>
</html>
