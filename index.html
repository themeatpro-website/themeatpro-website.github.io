<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Pro | Shop</title>
<link rel="stylesheet" href="style.css">
<script src="xlsx.full.min.js"></script>
</head>
<body>
<header>
  <img src="logo.png" alt="Logo">
  <h1>The Meat Pro</h1>
  <button id="cart-toggle" style="position:absolute;top:20px;right:20px;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;">🛒</button>
</header>

<div class="container">
  <h2>Shop</h2>
  <div class="product-grid" id="product-grid"></div>
</div>

<!-- Cart Sidebar -->
<div id="cart-sidebar">
  <span id="close-cart">&times;</span>
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <div class="cart-total" id="cart-total"></div>
  <button id="checkout-btn">Go to Checkout</button>
</div>

<footer>
  <p>© 2025 The Meat Pro. All rights reserved.</p>
</footer>

<script>
const grid = document.getElementById('product-grid');
const cartSidebar = document.getElementById('cart-sidebar');
const cartItemsDiv = document.getElementById('cart-items');
const cartTotalDiv = document.getElementById('cart-total');
const checkoutBtn = document.getElementById('checkout-btn');
const cartToggle = document.getElementById('cart-toggle');
const closeCart = document.getElementById('close-cart');

let cart = [];

fetch('products.xlsx')
.then(res=>res.arrayBuffer())
.then(data=>{
  const workbook = XLSX.read(data,{type:'array'});
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const products = XLSX.utils.sheet_to_json(sheet);

  products.forEach((prod,index)=>{
    const card = document.createElement('div');
    card.className='product-card';
    card.style.animationDelay=`${index*0.1}s`;
    card.innerHTML=`
      <img src="${prod.Image||'logo.png'}" alt="${prod.Name}">
      <div class="info">
        <h3>${prod.Name}</h3>
        <p>${prod.Description}</p>
        <div class="price">$${prod.Price}</div>
        <button class="add-to-cart">Add to Cart</button>
      </div>
    `;
    grid.appendChild(card);
    card.querySelector('.add-to-cart').addEventListener('click',()=>{
      cart.push({...prod, qty:1});
      updateCartSidebar();
    });
  });
});

function updateCartSidebar(){
  cartItemsDiv.innerHTML='';
  let total=0;
  cart.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='cart-item';
    div.innerHTML=`<span>${p.Name} x${p.qty||1}</span><span>$${(p.Price*(p.qty||1)).toFixed(2)}</span>`;
    cartItemsDiv.appendChild(div);
    total+=Number(p.Price)*(p.qty||1);
  });
  cartTotalDiv.textContent=`Total: $${total.toFixed(2)}`;
}

cartToggle.onclick=()=>cartSidebar.classList.add('active');
closeCart.onclick=()=>cartSidebar.classList.remove('active');

checkoutBtn.onclick=()=>{
  localStorage.setItem('cart',JSON.stringify(cart));
  window.location.href='checkout.html';
};
</script>
</body>
</html>
