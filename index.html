<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meat Pro | Premium Butchery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo-container" onclick="window.location.reload()" style="display:flex; align-items:center; cursor:pointer;">
            <img src="assets/logo.png" style="height:45px; margin-right:12px;" onerror="this.src='assets/logo.png'">
            <div class="logo-text">THE MEAT <span>PRO</span></div>
        </div>
        <button class="add-btn" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
    </nav>

    <div id="category-section" style="display:grid; grid-template-columns:repeat(5,1fr); gap:15px; padding:30px 8%;">
        <div onclick="filterByCategory('Chicken')" style="cursor:pointer; position:relative; height:180px; border-radius:12px; overflow:hidden;">
            <img src="chicken.jpg" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='assets/logo.png'">
            <h3 style="position:absolute; inset:0; background:rgba(0,0,0,0.4); color:white; display:flex; align-items:center; justify-content:center; margin:0; font-weight:900;">CHICKEN</h3>
        </div>
        </div>

    <div id="product-header" style="display:none; padding:20px 8%; justify-content:space-between; align-items:center;">
        <h2 id="current-category-name" style="font-family:'Roboto'; margin:0;"></h2>
        <button class="add-btn" style="background:#eee; color:black;" onclick="showCategories()">Back to Categories</button>
    </div>

    <main id="product-grid" style="display:none; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:30px; padding:40px 8%;"></main>

    <div id="product-modal" class="modal-overlay">
        <button onclick="closeModal()" style="position:absolute; top:30px; left:30px; z-index:5000; background:white; border:none; padding:12px 25px; border-radius:30px; font-weight:700; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.1);">&larr; Back to Shop</button>
        
        <div class="modal-content">
            <div class="modal-image-side">
                <img id="modal-img" src="" onerror="this.src='assets/logo.png'">
            </div>
            <div class="modal-info-side">
                <h1 id="modal-name" style="font-family:'Roboto'; font-size:3rem; margin:0 0 10px 0; text-transform:uppercase;"></h1>
                <div class="price-tag" style="font-size:2rem; margin-bottom:20px;">
                    <img src="assets/currency-logo.png" class="currency-icon"> <span id="modal-price-val"></span>
                </div>
                <p id="modal-long-desc" style="color:#555; line-height:1.8; font-size:1.1rem; margin-bottom:30px;"></p>
                
                <div style="font-weight:700; margin-bottom:10px;">SELECT QUANTITY</div>
                <div class="qty-controls">
                    <button onclick="adjustModalQty(-1)">-</button>
                    <input type="number" id="modal-qty-input" value="1" readonly>
                    <button onclick="adjustModalQty(1)">+</button>
                </div>
                
                <button id="modal-add-btn" class="confirm-btn" style="width:100%; padding:25px; font-size:1.3rem;">ADD TO ORDER</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar">
        <div class="cart-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-family:'Roboto'; margin:0;">Your Order</h2>
            <button onclick="toggleCart()" class="close-cart-btn"><span>&times;</span></button>
        </div>
        <div id="cart-items" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="margin-top:auto; padding-top:20px; border-top:2px solid #eee;">
            <div style="display:flex; justify-content:space-between; font-weight:900; font-size:1.4rem; margin-bottom:20px;">
                <span>Total</span>
                <span>AED <span id="cart-total">0.00</span></span>
            </div>
            <button class="confirm-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
