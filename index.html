<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meat Pro | Butchery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@300;500;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo-container" onclick="window.location.reload()" style="display: flex; align-items: center; cursor: pointer;">
            <img src="assets/logo.png" alt="Meat Pro Logo" style="height: 45px; margin-right: 12px;">
            <div class="logo-text">THE MEAT <span>PRO</span></div>
        </div>
        
        <button class="cart-trigger" onclick="toggleCart()">
            <span>Cart</span>
            <span id="cart-count">0</span>
        </button>
    </nav>

    <div id="category-section" class="category-grid">
        <div class="cat-card" onclick="filterByCategory('Chicken')">
            <img src="chicken-thumb.jpg" alt="Chicken">
            <h3>CHICKEN</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Mutton')">
            <img src="mutton-thumb.jpg" alt="Mutton">
            <h3>MUTTON</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Beef')">
            <img src="beef-thumb.jpg" alt="Beef">
            <h3>BEEF</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Fish')">
            <img src="fish-thumb.jpg" alt="Fish">
            <h3>FISH</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Marinades')">
            <img src="marinades-thumb.jpg" alt="Marinades">
            <h3>MARINADES</h3>
        </div>
    </div>

    <div id="product-header" style="display:none;">
        <div class="header-left">
            <h2 id="current-category-name"></h2>
            <div class="search-box">
                <input type="text" id="product-search" placeholder="Search in category..." onkeyup="handleSearch()">
            </div>
        </div>
        <button class="back-btn" onclick="showCategories()">&larr; Back to Categories</button>
    </div>

    <main id="product-grid" style="display:none;"></main>

    <div id="product-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div class="modal-content">
                <div class="modal-image-side">
                    <img id="modal-img" src="" alt="Product">
                </div>
                <div class="modal-info-side">
                    <h2 id="modal-name"></h2>
                    <div class="modal-price">
                        <img src="currency-logo.png" class="currency-icon">
                        <span id="modal-price-val"></span>
                    </div>
                    <p id="modal-long-desc"></p>
                    
                    <div class="qty-selector-container">
                        <label>Select Quantity</label>
                        <div class="qty-controls">
                            <button onclick="adjustModalQty(-1)">-</button>
                            <input type="number" id="modal-qty-input" value="1" min="1" readonly>
                            <button onclick="adjustModalQty(1)">+</button>
                        </div>
                    </div>

                    <button id="modal-add-btn" class="confirm-btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Order</h2>
            <button onclick="toggleCart()" class="close-cart">&times;</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div class="total-display">
                <span>Total</span>
                <span>
                    <img src="currency-logo.png" class="currency-icon">
                    <span id="cart-total">0.00</span>
                </span>
            </div>
            <button class="confirm-btn mobile-sticky" onclick="goToCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
