<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meat Pro | Premium UAE Butchery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@300;500;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo-container" onclick="window.location.reload()">
            <div class="logo-text">THE MEAT <span>PRO</span></div>
        </div>
        
        <button class="cart-trigger" onclick="toggleCart()">
            <span>Cart</span>
            <span id="cart-count">0</span>
        </button>
    </nav>

    <header class="hero">
        <h1>Professional Grade Cuts</h1>
        <p>Premium quality meats delivered across the UAE.</p>
    </header>

    <main id="product-grid">
        <div style="text-align: center; grid-column: 1/-1; padding: 50px;">
            <p>Loading selections...</p>
        </div>
    </main>

    <div id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Order</h2>
            <button onclick="toggleCart()" class="close-cart">&times;</button>
        </div>

        <div id="cart-items">
            <p style="color: #888; margin-top: 20px;">Your cart is empty.</p>
        </div>

        <div class="cart-footer">
            <div class="total-display">
                <span>Total</span>
                <span>
                    <img src="currency-logo.png" class="currency-icon">
                    <span id="cart-total">0.00</span>
                </span>
            </div>
            <button class="confirm-btn" onclick="goToCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <script src="xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
