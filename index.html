<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meat Pro | Premium Butchery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo-container" onclick="window.location.reload()" style="display:flex; align-items:center; cursor:pointer;">
            <img src="assets/logo.png" alt="The Meat Pro Logo" style="height:45px; margin-right:12px;" onerror="this.src='assets/logo.png'">
            <div class="logo-text">THE MEAT <span>PRO</span></div>
        </div>
        <button class="add-btn" onclick="toggleCart()" style="background:var(--dark-grey); color:white; padding: 12px 25px;">
            Cart (<span id="cart-count">0</span>)
        </button>
    </nav>

    <div id="category-section" class="category-grid">
        <div class="cat-card" onclick="filterByCategory('Chicken')">
            <img src="chicken.jpg" alt="Chicken" onerror="this.src='assets/logo.png'">
            <h3>CHICKEN</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Mutton')">
            <img src="mutton.jpg" alt="Mutton" onerror="this.src='assets/logo.png'">
            <h3>MUTTON</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Beef')">
            <img src="beef.jpg" alt="Beef" onerror="this.src='assets/logo.png'">
            <h3>BEEF</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Fish')">
            <img src="fish.jpg" alt="Fish" onerror="this.src='assets/logo.png'">
            <h3>FISH</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Marinades')">
            <img src="marinades.jpg" alt="Marinades" onerror="this.src='assets/logo.png'">
            <h3>MARINADES</h3>
        </div>
    </div>

    <div id="product-header" style="display:none; padding:20px 8%; justify-content:space-between; align-items:center; background:white; border-bottom:1px solid #eee;">
        <h2 id="current-category-name" style="margin:0; font-family:'Roboto'; text-transform:uppercase; letter-spacing:1px;"></h2>
        <button class="add-btn" style="background:#eee; color:black;" onclick="showCategories()">&larr; Back to Categories</button>
    </div>

    <main id="product-grid" style="display:none;"></main>

    <div id="product-modal" class="modal-overlay">
        <div class="modal-header">
            <h2 style="font-family:'Roboto'; margin:0; font-size:1.2rem; color:#888;">PRODUCT DETAILS</h2>
            <button class="close-cart-btn" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <img id="modal-img" class="modal-img-large" src="" alt="Product Image" onerror="this.src='assets/logo.png'">
            
            <h1 id="modal-name" style="font-family:'Roboto'; font-size:2.5rem; margin:0 0 10px 0; line-height:1;"></h1>
            
            <div class="price-tag" style="font-size:1.8rem; margin-bottom:20px;">
                <img src="assets/currency-logo.png" class="currency-icon" alt="AED">
                <span id="modal-price-val"></span>
            </div>
            
            <p id="modal-long-desc" style="color:#555; line-height:1.7; font-size:1.1rem; margin-bottom:30px;"></p>
            
            <div style="border-top:1px solid #eee; padding-top:30px;">
                <div style="font-weight:700; margin-bottom:15px; font-size:0.9rem; color:#888;">SELECT QUANTITY</div>
                <div class="qty-controls">
                    <button onclick="adjustModalQty(-1)">-</button>
                    <input type="number" id="modal-qty-input" value="1" readonly>
                    <button onclick="adjustModalQty(1)">+</button>
                </div>
                
                <button id="modal-add-btn" class="confirm-btn" style="margin-top:20px; padding:22px;">ADD TO MY ORDER</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar">
        <div class="cart-header">
            <h2 style="font-family:'Roboto'; margin:0;">YOUR ORDER</h2>
            <button onclick="toggleCart()" class="close-cart-btn"><span>&times;</span></button>
        </div>
        
        <div id="cart-items" style="padding:30px;">
            </div>
        
        <div style="margin-top:auto; padding:30px; border-top:2px solid #eee; background: #fafafa;">
            <div style="display:flex; justify-content:space-between; font-weight:900; font-size:1.5rem; margin-bottom:25px;">
                <span>Total</span>
                <span style="color:var(--primary-red);">AED <span id="cart-total">0.00</span></span>
            </div>
            <button class="confirm-btn" onclick="window.location.href='checkout.html'" style="box-shadow: 0 10px 20px rgba(198, 40, 40, 0.2);">
                PROCEED TO CHECKOUT
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
