<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meat Pro | Shop</title>
<link rel="stylesheet" href="style.css">
<script src="xlsx.full.min.js"></script>
</head>
<body>
<header>
  <img src="logo.png" alt="The Meat Pro Logo" style="width:120px;margin:0.5rem auto;display:block;">
  <h1>The Meat Pro</h1>
</header>

<div class="container">
  <h2>Products</h2>
  <div class="product-grid" id="product-grid"></div>
</div>

<footer>
  <p>© 2025 The Meat Pro. All rights reserved.</p>
</footer>

<script>
const grid = document.getElementById('product-grid');

fetch('products.xlsx')
  .then(res => res.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(data, {type:'array'});
    const firstSheet = workbook.SheetNames[0];
    const worksheet = workbook.Sheets[firstSheet];
    const products = XLSX.utils.sheet_to_json(worksheet);

    products.forEach((prod, index) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.style.animationDelay = `${index * 0.1}s`; // staggered animation
      card.innerHTML = `
        <img src="${prod.Image || 'logo.png'}" alt="${prod.Name}">
        <div class="info">
          <h3>${prod.Name}</h3>
          <p>${prod.Description}</p>
          <div class="price">$${prod.Price}</div>
          <button class="add-to-cart">Add to Cart</button>
        </div>
      `;
      grid.appendChild(card);
    });

    // Initialize cart
    const cart = [];
    const cartButtons = document.querySelectorAll('.add-to-cart');
    cartButtons.forEach((btn, i) => {
      btn.addEventListener('click', () => {
        cart.push(products[i]);
        updateCart();
      });
    });

    const cartDiv = document.createElement('div');
    cartDiv.id = 'cart-summary';
    cartDiv.style.marginTop = '2rem';
    cartDiv.style.textAlign = 'right';
    grid.parentNode.appendChild(cartDiv);

    function updateCart() {
      let total = cart.reduce((sum, p) => sum + Number(p.Price), 0);
      cartDiv.innerHTML = `<strong>Cart:</strong> ${cart.length} items — Total: $${total.toFixed(2)}`;
    }
  })
  .catch(err => console.error('Error loading products:', err));
</script>
</body>
</html>
