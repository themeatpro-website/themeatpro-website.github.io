<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meat Pro | Premium Butchery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@300;500;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo-container" onclick="window.location.reload()">
            <div class="logo-text">THE MEAT <span>PRO</span></div>
        </div>
        
        <button class="cart-trigger" onclick="toggleCart()">
            <span>Cart</span>
            <span id="cart-count">0</span>
        </button>
    </nav>

    <header class="hero">
        <h1>Professional Grade Cuts</h1>
        <p>From our farm to your kitchen. Minimalist quality, premium taste.</p>
    </header>

    <main id="product-grid">
        <div style="text-align: center; grid-column: 1/-1; padding: 50px;">
            <p>Loading premium selections...</p>
        </div>
    </main>

    <div id="cart-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px;">
            <h2 style="margin: 0; font-family: 'Roboto'; text-transform: uppercase;">Your Order</h2>
            <button onclick="toggleCart()" style="background: none; border: none; font-size: 2.5rem; cursor: pointer; line-height: 1;">&times;</button>
        </div>

        <div id="cart-items">
            <p style="color: #888; margin-top: 20px;">Your cart is empty.</p>
        </div>

        <div style="margin-top: auto; border-top: 2px solid #eee; padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: 700;">
                <span>Total</span>
                <span>$<span id="cart-total">0.00</span></span>
            </div>
            <button class="confirm-btn" onclick="goToCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <script src="xlsx.full.min.js"></script>
    
    <script src="app.js"></script>

</body>
</html>
