<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meat Pro | Premium UAE Butchery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@300;500;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo-container" onclick="window.location.reload()" style="display: flex; align-items: center; cursor: pointer;">
            <img src="logo.png" alt="Meat Pro Logo" style="height: 45px; margin-right: 12px;">
            <div class="logo-text">THE MEAT <span>PRO</span></div>
        </div>
        
        <button class="cart-trigger" onclick="toggleCart()">
            <span>Cart</span>
            <span id="cart-count">0</span>
        </button>
    </nav>

    <div id="category-section" class="category-grid">
        <div class="cat-card" onclick="filterByCategory('Chicken')">
            <img src="chicken-thumb.jpg" alt="Chicken">
            <h3>CHICKEN</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Mutton')">
            <img src="mutton-thumb.jpg" alt="Mutton">
            <h3>MUTTON</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Beef')">
            <img src="beef-thumb.jpg" alt="Beef">
            <h3>BEEF</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Fish')">
            <img src="fish-thumb.jpg" alt="Fish">
            <h3>FISH</h3>
        </div>
        <div class="cat-card" onclick="filterByCategory('Marinades')">
            <img src="marinades-thumb.jpg" alt="Marinades">
            <h3>MARINADES</h3>
        </div>
    </div>

    <div id="product-header" style="display:none; padding: 20px 8%; align-items: center; justify-content: space-between; background: #fff; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 15px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h2 id="current-category-name" style="text-transform: uppercase; margin: 0; font-family: 'Roboto'; font-weight: 900;"></h2>
            <div class="search-container">
                <input type="text" id="product-search" placeholder="Search..." onkeyup="handleSearch()">
            </div>
        </div>
        <button onclick="showCategories()" style="background:none; border:none; text-decoration:underline; cursor:pointer; color:var(--primary-red); font-weight: 700;">&larr; Back</button>
    </div>

    <main id="product-grid" style="display:none;"></main>

    <div id="cart-sidebar">
        </div>

    <script src="app.js"></script>
</body>
</html>
