<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Meat Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        body { font-family: 'Noto Sans', sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; position: relative; }
        .back-link { position: absolute; top: 15px; left: 20px; text-decoration: none; color: #888; font-size: 0.85rem; font-weight: bold; transition: 0.3s; }
        .back-link:hover { color: #C62828; }
        h2 { color: #C62828; font-weight: 900; margin-bottom: 30px; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-auth { background: #C62828; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .toggle-auth { margin-top: 20px; font-size: 0.9rem; color: #666; }
        .toggle-auth span { color: #C62828; cursor: pointer; font-weight: bold; }
        #auth-msg { margin-top: 15px; font-size: 0.9rem; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="back-link">← Back to Shop</a>

        <h2 id="auth-title">Login to Account</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button id="auth-btn" class="btn-auth">Login</button>
        <p id="auth-msg"></p>
        <p class="toggle-auth" id="toggle-text">Don't have an account? <span id="switch-auth">Sign Up</span></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = {
                apiKey: "AIzaSyC0LqPa73C7OG295rY105XApK57SQ05et4", 
                authDomain: "the-meat-pro.firebaseapp.com",
                projectId: "the-meat-pro",
                storageBucket: "the-meat-pro.appspot.com",
                messagingSenderId: "1054538254894",
                appId: "1:680467664784:web:9ef0a533bf354926f16d15" 
            };
            
            if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

            let isLogin = true;
            const authBtn = document.getElementById('auth-btn');
            const switchAuth = document.getElementById('switch-auth');
            const authTitle = document.getElementById('auth-title');
            const toggleText = document.getElementById('toggle-text');
            const msg = document.getElementById('auth-msg');

            switchAuth.addEventListener('click', () => {
                isLogin = !isLogin;
                authTitle.innerText = isLogin ? "Login to Account" : "Create Account";
                authBtn.innerText = isLogin ? "Login" : "Sign Up";
                toggleText.innerHTML = isLogin ? "Don't have an account? <span id='switch-auth'>Sign Up</span>" : "Already have an account? <span id='switch-auth'>Login</span>";
                // Re-attach listener since we modified innerHTML
                document.getElementById('switch-auth').addEventListener('click', arguments.callee);
            });

            authBtn.addEventListener('click', () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                msg.innerText = "Processing...";
                msg.style.color = "#333";

                if (isLogin) {
                    firebase.auth().signInWithEmailAndPassword(email, password)
                        .then(() => window.location.href = "index.html")
                        .catch(err => { msg.innerText = err.message; msg.style.color = "red"; });
                } else {
                    firebase.auth().createUserWithEmailAndPassword(email, password)
                        .then(() => window.location.href = "account.html")
                        .catch(err => { msg.innerText = err.message; msg.style.color = "red"; });
                }
            });
        });
    </script>
</body>
</html>
