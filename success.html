<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status | The Meat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        :root {
            --red: #C62828;
            --green: #2e7d32;
            --orange: #ef6c00;
            --grey: #757575;
            --gold: #FFD700;
        }
        body { 
            font-family: 'Noto Sans', sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f8f9fa; 
            color: #333;
        }
        .status-card { 
            background: white; 
            max-width: 550px; 
            margin: 0 auto; 
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
        }
        .order-id { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--red); 
            margin: 15px 0;
            letter-spacing: -1px;
        }
        .status-badge { 
            display: inline-block; 
            padding: 16px 32px; 
            border-radius: 100px; 
            font-weight: 900; 
            margin-top: 20px; 
            font-size: 1.1rem; 
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        /* Points Celebration Box */
        .points-earned-box {
            background: #fffdf0;
            border: 2px dashed var(--gold);
            border-radius: 15px;
            padding: 20px;
            margin: 25px 0;
            display: none; /* Hidden until data loads */
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .status-pending { background: #f5f5f5; color: var(--grey); border: 1px solid #ddd; }
        .status-prepared { 
            background: #fff3e0; color: var(--orange); border: 2px solid var(--orange);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .status-delivery { 
            background: #e8f5e9; color: var(--green); border: 2px solid var(--green); 
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 { margin-bottom: 5px; font-weight: 900; }
        #sub-text { color: #666; line-height: 1.5; margin-bottom: 30px; min-height: 50px; }
        
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 30px; }
        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-home { border: 2px solid #eee; background: white; color: #333; }
        .btn-account { background: var(--red); color: white; border: none; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="status-card">
        <h1 id="main-heading">Order Received</h1>
        <p id="sub-text">Connecting to the kitchen...</p>
        
        <div class="order-id" id="display-order-id">#0000</div>

        <div id="status-display" class="status-badge status-pending pulse">
            Checking Status...
        </div>

        <div id="points-box" class="points-earned-box">
            <div style="font-size: 0.8rem; font-weight: bold; color: #b8860b; text-transform: uppercase;">Pro Loyalty Rewards</div>
            <div style="font-size: 1.4rem; font-weight: 900; margin: 5px 0;">🌟 +<span id="earned-points">0</span> Points Earned!</div>
            <div style="font-size: 0.85rem; color: #666;">These will be added to your account once delivered.</div>
        </div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">
        
        <div class="btn-group">
            <a href="index.html" class="btn btn-home">Return to Shop</a>
            <a href="account.html" class="btn btn-account">View My Points</a>
        </div>
    </div>

    <audio id="notif-sound" src="assets/notif.mp3" preload="auto"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        const BACKEND_URL = "https://themeatpro-backend.vercel.app";
        let lastKnownStatus = "";

        if (orderId) {
            document.getElementById('display-order-id').innerText = `#${orderId.toUpperCase()}`;
        }

        async function checkOrderStatus() {
            if (!orderId) return;

            try {
                const response = await fetch(`${BACKEND_URL}/api/order-status?id=${orderId}`);
                if (!response.ok) return;
                const data = await response.json();
                
                // Show points earned (Calculated from order total)
                if (data.total && document.getElementById('points-box').style.display !== 'block') {
                    const points = Math.floor(parseFloat(data.total));
                    document.getElementById('earned-points').innerText = points;
                    document.getElementById('points-box').style.display = 'block';
                }

                if (data.status !== lastKnownStatus) {
                    updateUI(data.status);
                    lastKnownStatus = data.status;
                }
            } catch (err) {
                console.error("Connection to kitchen lost.");
            }
        }

        function updateUI(status) {
            const display = document.getElementById('status-display');
            const heading = document.getElementById('main-heading');
            const subText = document.getElementById('sub-text');
            const sound = document.getElementById('notif-sound');

            display.className = "status-badge";
            
            if (status === 'prepared') {
                heading.innerText = "Order Prepared!";
                display.innerText = "🥩 Ready & Packed";
                display.classList.add('status-prepared');
                subText.innerHTML = "The butcher has finished cutting and packing your order.";
                if (sound) sound.play().catch(() => {});
            } 
            else if (status === 'out-for-delivery') {
                heading.innerText = "On Its Way!";
                display.innerText = "🚚 Out for Delivery";
                display.classList.add('status-delivery');
                subText.innerHTML = "Our driver has left the shop and is heading to your location.";
                if (sound) sound.play().catch(() => {});
            } 
            else if (status === 'delivered') {
                heading.innerText = "Order Delivered";
                display.innerText = "✅ Enjoy Your Meal";
                display.classList.add('status-delivery');
                subText.innerHTML = "Order has been successfully delivered. Thank you for choosing The Meat Pro!";
                clearInterval(pollingInterval);
            }
            else {
                heading.innerText = "Order Received";
                display.innerText = "⏲️ Butcher is cutting...";
                display.classList.add('status-pending', 'pulse');
                subText.innerText = "The butcher is currently preparing your selection.";
            }
        }

        const pollingInterval = setInterval(checkOrderStatus, 2500);
        checkOrderStatus();
    </script>
</body>
</html>
