<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmed | The Meat Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { text-align: center; padding: 50px; font-family: 'Noto Sans', sans-serif; }
        .status-box { 
            max-width: 500px; margin: 0 auto; padding: 40px; 
            background: white; border-radius: 20px; box-shadow: var(--shadow);
        }
        #alert-popup {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 20px 40px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="alert-popup">🔔 YOUR MEAT IS PREPARED & READY!</div>
    <audio id="notif-sound" src="assets/notif.mp3" preload="auto"></audio>

    <div class="status-box">
        <h1 style="color:var(--primary-red); font-family:'Roboto';">ORDER RECEIVED!</h1>
        <p>The butcher is now preparing your selection.</p>
        <img src="assets/logo.png" style="width: 100px; margin: 20px 0;">
        <div id="wait-msg">Please keep this page open for live updates...</div>
    </div>

    <script>
        // Get the last order ID from local storage
        const lastOrder = JSON.parse(localStorage.getItem('lastMeatOrderInfo'));
        const orderId = lastOrder ? lastOrder.id : null;

        async function checkStatus() {
            if (!orderId) return;

            try {
                const res = await fetch(`http://localhost:4427/api/order-status/${orderId}`);
                const data = await res.json();

                if (data.status === 'prepared') {
                    // Show Notification
                    document.getElementById('alert-popup').style.display = 'block';
                    document.getElementById('wait-msg').innerHTML = "<h2 style='color:#2e7d32'>READY FOR COLLECTION!</h2>";
                    
                    // Play Sound
                    document.getElementById('notif-sound').play();

                    // Stop checking
                    clearInterval(statusInterval);
                }
            } catch (e) { console.log("Waiting for server..."); }
        }

        // Check every 5 seconds
        const statusInterval = setInterval(checkStatus, 5000);
    </script>
</body>
</html>
