<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status | The Meat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #C62828;
            --green: #2e7d32;
            --orange: #ef6c00;
        }
        body { 
            font-family: 'Noto Sans', sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f8f9fa; 
            color: #333;
        }
        .status-card { 
            background: white; 
            max-width: 550px; 
            margin: 0 auto; 
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
        }
        .order-id { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--red); 
            margin: 15px 0;
            letter-spacing: -1px;
        }
        .status-badge { 
            display: inline-block; 
            padding: 16px 32px; 
            border-radius: 100px; 
            font-weight: 900; 
            margin-top: 20px; 
            font-size: 1.1rem; 
            text-transform: uppercase;
        }
        .pending { 
            background: #fff3e0; 
            color: var(--orange); 
            border: 1px solid #ffe0b2; 
        }
        .ready { 
            background: #e8f5e9; 
            color: var(--green); 
            border: 2px solid var(--green); 
            display: none; 
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        h1 { margin-bottom: 5px; font-weight: 900; }
        #sub-text { color: #666; line-height: 1.5; margin-bottom: 30px; }
        
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn-home {
            margin-top: 40px;
            padding: 12px 30px;
            border: 2px solid #eee;
            background: white;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-home:hover { background: #f0f0f0; border-color: #ddd; }
    </style>
</head>
<body>

    <div class="status-card">
        <h1 id="main-heading">Order Received</h1>
        <p id="sub-text">The butcher is currently preparing your selection.</p>
        
        <div class="order-id" id="display-order-id">#0000</div>

        <div id="status-pending" class="status-badge pending pulse">⏲️ Butcher is cutting...</div>
        <div id="status-ready" class="status-badge ready"></div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">
        
        <button class="btn-home" onclick="window.location.href='index.html'">Return to Home</button>
    </div>

    <audio id="notif-sound" src="assets/notif.mp3" preload="auto"></audio>

    <script>
        // 1. Get Order ID from the browser URL (e.g., success.html?id=12345)
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        const BACKEND_URL = "https://themeatpro-backend.vercel.app"; // Your production Vercel URL
    
        if (orderId) {
            document.getElementById('display-order-id').innerText = `#${orderId}`;
        } else {
            document.getElementById('sub-text').innerText = "We couldn't find your order ID, but the kitchen has received your request.";
        }
    
        // 2. The Polling Logic
        async function checkOrderStatus() {
            if (!orderId) return;
    
            try {
                // Updated to use the Vercel production URL and the query param (?id=) structure
                const response = await fetch(`${BACKEND_URL}/api/order-status?id=${orderId}`);
    
                if (!response.ok) return;
    
                const data = await response.json();
    
                // Logic remains the same: trigger UI update if status is 'prepared'
                if (data.status === 'prepared') {
                    // Note: Ensure your backend includes 'method' in the response if you want dynamic messages
                    handleOrderReady(data.method || "Delivery"); 
                }
            } catch (err) {
                console.error("Connection to kitchen lost. Retrying...");
            }
        }
    
        // 3. Update UI when ready
        function handleOrderReady(method) {
            const pendingBadge = document.getElementById('status-pending');
            const readyBadge = document.getElementById('status-ready');
            const heading = document.getElementById('main-heading');
            const subText = document.getElementById('sub-text');
    
            if (pendingBadge) pendingBadge.style.display = 'none';
            if (readyBadge) readyBadge.style.display = 'inline-block';
            if (heading) heading.innerText = "Order Complete!";
    
            // DYNAMIC MESSAGE LOGIC
            if (method === "Click and Collect") {
                if (readyBadge) readyBadge.innerHTML = "✅ Ready for Collection";
                if (subText) subText.innerHTML = "Your order is packed and waiting at the <strong>Al Jaddaf Store</strong> counter.";
            } else {
                if (readyBadge) readyBadge.innerHTML = "✅ Out for Delivery";
                if (subText) subText.innerHTML = "Our dispatch team has finished preparing your order. Our driver is now on the way!";
            }
    
            // Notification Sound
            const sound = document.getElementById('notif-sound');
            if (sound) {
                sound.play().catch(() => console.log("Sound play delayed until user interaction."));
            }
    
            // Stop the loop once the order is ready
            clearInterval(pollingInterval);
        }
    
        // 4. Run check every 5 seconds for production efficiency
        const pollingInterval = setInterval(checkOrderStatus, 5000);
    
        // Run once immediately on load
        checkOrderStatus();
    </script>
</body>
</html>
